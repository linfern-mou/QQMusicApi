site_name: QQMusicApi
site_description: 使用 Python 编写的用于调用 QQ音乐 各种 API 的库.

theme:
  name: "material"
  language: zh
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: lucide/sun-moon
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    toggle:
      icon: material/weather-night
      name: 切换到深色模式
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    toggle:
      icon: material/weather-sunny
      name: 切换到浅色模式
  icon:
    repo: fontawesome/brands/github
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - announce.dismiss
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - toc.follow

repo_name: l-1124/QQMusicApi
repo_url: https://github.com/l-1124/QQMusicApi
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/l-1124/QQMusicApi

markdown_extensions:
  - nl2br
  - abbr
  - attr_list
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - markdown_callouts.github_callouts
  - toc:
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.caret
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.blocks.html
  - pymdownx.blocks.definition
  - pymdownx.blocks.tab:
      alternate_style: True
      combine_header_slug: True
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.snippets:
      url_download: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.superfences:

plugins:
  - search:
      lang: zh
  - mkdocstrings:
      handlers:
        python:
          paths: [., qqmusic_api]
          load_external_modules: true
          options:
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_symbol_type_heading: true
            heading_level: 2
            filters: ["!^_"]
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: spacy
          inventories:
            - https://docs.python.org/3/objects.inv

nav:
  - 主页: index.md
  - 教程:
    - 快速开始: tutorial/start.md
    - 凭证（Credential）: tutorial/credential.md
    - Client 与连接管理: tutorial/client.md
  - API 文档:
    - api: api/modules.md
    - core: api/core.md
    - exceptions: api/exceptions.md
    - model: api/model.md
  - 帮助:
    - 贡献指南: contributing.md
    - 编写指南: coding.md
  - Release Notes: release-notes.md
