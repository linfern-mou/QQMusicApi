[project]
site_name = "QQMusicApi"
site_description = "使用 Python 编写的用于调用 QQ音乐 各种 API 的库."
repo_name = "l-1124/QQMusicApi"
repo_url = "https://github.com/l-1124/QQMusicApi"
docs_dir = "docs"
site_dir = "site"
nav = [
  { "主页" = "index.md" },
  { "教程" = [
    { "快速开始" = "tutorial/start.md" },
    { "Credential" = "tutorial/credential.md" },
    { "Client" = "tutorial/client.md" },
  ] },
  { "API 文档" = [
    { "Modules" = [
      { "AlbumApi" = "reference/modules/album.md" },
      { "CommentApi" = "reference/modules/comment.md" },
      { "LoginApi" = "reference/modules/login.md" },
      { "LoginUtils" = "reference/modules/login_utils.md" },
      { "LyricApi" = "reference/modules/lyric.md" },
      { "MvApi" = "reference/modules/mv.md" },
      { "SearchApi" = "reference/modules/search.md" },
      { "SingerApi" = "reference/modules/singer.md" },
      { "SonglistApi" = "reference/modules/songlist.md" },
      { "UserApi" = "reference/modules/user.md" },
      { "RecommendApi" = "reference/modules/recommend.md" },
    ] },
    { "Models" = [
      { "album" = "reference/model/album.md" },
      { "base" = "reference/model/base.md" },
      { "comment" = "reference/model/comment.md" },
      { "login" = "reference/model/login.md" },
      { "lyric" = "reference/model/lyric.md" },
      { "mv" = "reference/model/mv.md" },
      { "recommend" = "reference/model/recommend.md" },
      { "request" = "reference/model/request.md" },
      { "search" = "reference/model/search.md" },
      { "singer" = "reference/model/singer.md" },
      { "song" = "reference/model/song.md" },
      { "songlist" = "reference/model/songlist.md" },
      { "top" = "reference/model/top.md" },
      { "user" = "reference/model/user.md" },
    ] },
    { "Core" = [
      { "client" = "reference/core/client.md" },
      { "request" = "reference/core/request.md" },
      { "versioning" = "reference/core/versioning.md" },
      { "exception" = "reference/core/exception.md" },
    ] },
  ] },
  { "帮助" = [
    { "贡献指南" = "contributing.md" },
    { "编写指南" = "coding.md" },
  ] },
  { "Release Notes" = "release-notes.md" },
]

[project.theme]
language = "zh"
font.code = "JetBrains Mono"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.tabs.link",
  "navigation.instant",
  "navigation.tabs",
  "navigation.instant.prefetch",
  "navigation.sections",
  "navigation.indexes",
  "navigation.top",
  "navigation.tracking",
  "navigation.path",
  "search.suggest",
  "search.highlight",
  "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "切换到浅色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "切换到深色模式"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "切换到系统偏好"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/l-1124/QQMusicApi"

[project.markdown_extensions]
nl2br = {}
def_list = {}
md_in_html = {}
toc = { toc_depth = 3 }

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.snippets]
url_download = true

[project.plugins]
search = { lang = "zh" }

[project.plugins.mkdocstrings.handlers.python]
paths = [".", "qqmusic_api"]
load_external_modules = true
inventories = ["https://docs.python.org/3/objects.inv"]

[project.plugins.mkdocstrings.handlers.python.options]
members_order = "source"
separate_signature = true
show_root_heading = true
show_symbol_type_heading = true
heading_level = 2
filters = ["!^_"]
show_signature_annotations = true
signature_crossrefs = true
merge_init_into_class = true
docstring_section_style = "spacy"
extensions = [
  "unpack_typeddict",
  "griffe_pydantic",
  "docstring_inheritance.griffe",
  "griffe_inherited_docstrings",
]
