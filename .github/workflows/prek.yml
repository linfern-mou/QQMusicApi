name: prek

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, '🧹 chore(release-notes):') && !startsWith(github.event.head_commit.message, 'chore(release-notes):')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: 3.12
      - name: Install the project
        run: uv sync --all-groups --all-extras
      - name: Install prek
        run: uv pip install prek
      - uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek-3|${{ env.pythonLocation }}|${{ hashFiles('prek.toml') }}
      - name: Run prek
        run: uv run prek run --files $(git diff --name-only HEAD^ HEAD) --show-diff-on-failure --color=always
