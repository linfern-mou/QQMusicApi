default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-merge-conflict" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml", args = ["--unsafe"] },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer", exclude = '^LICENSE|\.(html|csv|txt|svg)$' },
  { id = "pretty-format-json", args = ["--autofix", "--no-ensure-ascii", "--no-sort-keys"] },
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], exclude = '\.(html|svg|md)$' },
]

[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.13.9"
hooks = [
  { id = "commitizen", additional_dependencies = ["cz-conventional-gitmoji"] },
]

[[repos]]
repo = "https://github.com/ljnsn/cz-conventional-gitmoji"
rev = "v0.7.0"
hooks = [
  { id = "conventional-gitmoji" },
]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.22.0"
hooks = [
  { id = "markdownlint-cli2", args = ["--fix"] },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff"
name = "ruff"
entry = "uv run ruff check"
language = "system"
files = '\.(py|pyi)$'
stages = ["pre-commit"]
args = ["--fix"]

[[repos.hooks]]
id = "ruff-format"
name = "ruff-format"
entry = "uv run ruff format"
language = "system"
files = '\.(py|pyi)$'
stages = ["pre-commit"]

[[repos.hooks]]
id = "pyrefly"
name = "pyrefly"
entry = "uv run pyrefly check"
language = "system"
files = '\.(py|pyi)$'
stages = ["pre-commit"]

[[repos.hooks]]
id = "docs-build"
name = "docs build"
entry = "uv run zensical build"
files = '^docs/'
pass_filenames = false
language = "system"
stages = ["pre-push"]
