services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/web/data
      - ./accounts.toml:/app/web/accounts.toml:ro
      - ./config.toml:/app/web/config.toml:ro
    environment:
      - QQMUSIC_SERVER_HOST=0.0.0.0
    restart: unless-stopped
